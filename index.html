<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iPod Portfolio Prototype</title>
    <link rel="stylesheet" href="css/styles.css?v=20260404e" />
  </head>
  <body>
    <main class="app">
      <section class="coverflow-shell" aria-label="Project cover flow">
        <div class="coverflow-stage">
          <div id="coverflow" class="coverflow" role="listbox" aria-label="Project covers"></div>
        </div>
        <p id="projectTitle" class="project-title" aria-live="polite"></p>
      </section>

      <aside class="wheel-dock" aria-label="iPod click wheel">
        <div id="wheel" class="wheel">
          <button id="menuButton" class="wheel-btn menu-btn">MENU</button>
          <button id="nextButton" class="wheel-btn next-btn" aria-label="Next cover">▶▶</button>
          <button id="prevButton" class="wheel-btn prev-btn" aria-label="Previous cover">◀◀</button>
          <button id="playPauseButton" class="wheel-btn playpause-btn" aria-label="Play pause">⏯</button>
          <button id="centerButton" class="center-btn" aria-label="Open selected item"></button>
        </div>
      </aside>
    </main>

    <div id="fullscreenCard" class="fullscreen-card" aria-hidden="true">
      <div class="fullscreen-inner">
        <h1 id="fullscreenTitle"></h1>
        <p id="fullscreenCopy">
          Placeholder: this is where the selected project page, resume, or section content will
          load.
        </p>
        <div id="fullscreenContent" class="fullscreen-content"></div>
      </div>
    </div>

    <script src="js/p5-loader.js?v=20260404e" defer></script>
    <script src="js/clock-view.js?v=20260404e" defer></script>
    <script src="js/pretext-lab-view.js?v=20260404e" defer></script>
    <script src="js/pretext-shapes-view.js?v=20260404e" defer></script>
    <script src="js/corner-view.js?v=20260404e" defer></script>
    <script src="js/resume-view.js?v=20260404e" defer></script>
    <script src="js/script.js?v=20260404e" defer></script>
  </body>
</html>
